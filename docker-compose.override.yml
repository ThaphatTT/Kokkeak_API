

services:
  api:
    build: null

    image: kokkak-dev:latest
    volumes:

      - ./:/app
      - cargo-target:/app/target
      - cargo-registry:/usr/local/cargo/registry
    command: ["cargo", "run", "--release", "-p", "kokkak-api"]

  worker:
    build: null
    image: kokkak-dev:latest
    volumes:
      - ./:/app
      - cargo-target:/app/target
      - cargo-registry:/usr/local/cargo/registry
    command: ["cargo", "run", "--release", "-p", "kokkak-worker"]

volumes:
  cargo-target:
  cargo-registry:
