{{- /*
T-29: Secret management via External Secrets Operator (ESO).

Renders an `ExternalSecret` that fetches the values from the
configured SecretStore and creates a Kubernetes `Secret` we can
mount as `envFrom:` in the Deployments. The chart's own `Secret`
template (templates/secret.yaml) is a placeholder; the
ExternalSecret overwrites it at reconcile time.

If you don't have ESO installed, set `externalSecrets.enabled=false`
and manage the Secret out-of-band (sealed-secrets / kubectl).
*/}}
{{- if .Values.externalSecrets.enabled -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "kokkak.fullname" . }}-secret
  labels:
    {{- include "kokkak.labels" . | nindent 4 }}
spec:
  # Refresh on a fixed schedule (12h). Rotation cadence should
  # match the source's rotation policy — every 24h is a common
  # minimum for short-lived creds like JWT signing keys.
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "12h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | default "SecretStore" }}
  # Pull only the keys we need — never expose the whole secret
  # if the source has unrelated fields.
  data:
    {{- range $k, $v := .Values.secret }}
    - secretKey: {{ $k }}
      remoteRef:
        key: {{ $v.remoteRefKey }}
        property: {{ $v.remoteRefProperty | default $k }}
    {{- end }}
{{- end }}
