# Kokkeak Helm values — T-22 defaults for staging.
#
# Production overrides happen via -f prod-values.yaml (or a
# values file passed to `helm install -f`).

# ---------- Global ----------
nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/kokkak/kokkak-api
  pullPolicy: IfNotPresent
  # The single image carries both kokkak-api and kokkak-worker.
  # We override the entrypoint / command per Deployment below.
  tag: ""

imagePullSecrets: []

# ---------- API Deployment ----------
api:
  enabled: true
  replicaCount: 2
  # Use the API binary by default; the worker Deployment
  # overrides this with the worker binary path.
  command: ["/usr/local/bin/kokkak-api"]
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  # T-22: HPA tuned for typical load. Adjust per-service after
  # observing real traffic with T-25 dashboards.
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  # T-22: probe paths align with crates/api/src/handlers/health.rs.
  # /healthz = liveness (process up), /readyz = readiness (deps ok).
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 6
  # T-22: graceful drain. SIGTERM triggers the axum_server
  # Handle::shutdown() in main.rs; we give 30s to finish
  # in-flight requests before SIGKILL.
  terminationGracePeriodSeconds: 30
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  # T-22: ingress for the API. Annotations assume
  # nginx-ingress-controller; switch to your own if different.
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "2m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    hosts:
      - host: api.kokkak.example
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - api.kokkak.example
        secretName: kokkak-api-tls

# ---------- Worker Deployment ----------
worker:
  enabled: true
  replicaCount: 1
  command: ["/usr/local/bin/kokkak-worker"]
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  autoscaling:
    # Workers scale on a custom metric (NATS queue depth) once
    # Prometheus Adapter is installed. Until then, fixed size.
    enabled: false
    minReplicas: 1
    maxReplicas: 5
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  livenessProbe:
    # Workers don't expose HTTP by default; use a TCP probe to
    # verify the process is alive.
    tcpSocket:
      port: 8081
    initialDelaySeconds: 10
    periodSeconds: 30
  readinessProbe:
    tcpSocket:
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10
  terminationGracePeriodSeconds: 30

# ---------- Service account ----------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ---------- Pod-level ----------
podAnnotations: {}
podSecurityContext:
  fsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ---------- ConfigMap / Secret ----------
# config holds non-secret runtime config; secret holds JWT
# material + DB credentials. Both referenced via envFrom.
config:
  KOKKAK_ENV: production
  KOKKAK_LOG__FORMAT: json
  KOKKAK_SERVER__ADDR: 0.0.0.0:8080
  KOKKAK_SERVER__TLS__ENABLED: "true"
  KOKKAK_SERVER__TLS__CERT_PATH: /etc/kokkak/tls/tls.crt
  KOKKAK_SERVER__TLS__KEY_PATH: /etc/kokkak/tls/tls.key
  KOKKAK_SERVER__WORKERS: "4"
  KOKKAK_DATABASE__POOL_SIZE: "20"
  KOKKAK_AUTH__ACCESS_TTL_SECS: "900"
  KOKKAK_AUTH__REFRESH_TTL_SECS: "2592000"
  KOKKAK_AUTH__ISSUER: kokkak-api
secret:
  # T-29: secrets are populated out-of-band (sealed-secrets /
  # external-secrets). Values here are placeholders that fail
  # validation if used as-is.
  KOKKAK_AUTH__JWT_SECRET: REPLACE_ME
  KOKKAK_DATABASE__SQLSERVER_URL: REPLACE_ME
  KOKKAK_REDIS__URL: REPLACE_ME
  KOKKAK_NATS__URL: REPLACE_ME
  KOKKAK_MONGO__URL: REPLACE_ME

# ---------- TLS ----------
# cert-manager issues the cert referenced by api.ingress.tls.
# Adjust the issuer ref to point at your cluster's Issuer / ClusterIssuer.
certManager:
  enabled: true
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

# ---------- External Secrets (T-29) ----------
# When enabled, the chart renders an `ExternalSecret` instead of
# the placeholder `Secret`. ESO fetches values from the upstream
# SecretStore and creates the `Secret` we reference via envFrom.
# See docs/SECRETS.md for setup.
externalSecrets:
  enabled: false
  refreshInterval: 12h
  secretStoreRef:
    name: kokkak-aws-sm
    kind: SecretStore
