# Security scans — Kokkeak (T-28).
#
# Three checks, three jobs, each blocking on its own failure:
#   1. cargo-deny  — license + advisory + banned-crate
#   2. cargo-audit — RustSec database (complementary to cargo-deny)
#   3. trivy       — container image CVE scan (production + release tags)
#
# Runs on every PR + push to main. PR-blocking; advisories at
# HIGH/CRITICAL level turn the check red.

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny check
        # `check` runs advisories + licenses + bans + sources +
        # multiple-versions in one pass. Drop `--exclude` flags
        # as the config in deny.toml gets sharper.
        run: cargo deny check

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        # --deny warnings surfaces MEDIUM/LOW too. Override with
        # `--ignore RUSTSEC-XXXX-YYYY` once we've triaged.
        run: cargo audit --deny warnings

  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    # Only scan tags + main — PRs don't produce an image yet.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: kokkak:scan
          # Scan the production build (release), not debug.
          build-args: |
            "BUILD_PROFILE=release"

      - name: Trivy scan (CRITICAL + HIGH only)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: kokkak:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          # Cache between runs to keep PR feedback fast.
          cache: true

      - name: Trivy scan — full report
        if: always()
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: kokkak:scan
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
        # Don't fail on the full report — just attach it for
        # the security team to review in the Security tab.

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
