# GitHub Actions CI for Kokkeak_API (plan T-02 + AGENTS.md §2).
#
# Four commit gates run in lock-step with what AGENTS.md §2 mandates:
#   1. cargo fmt --check
#   2. cargo clippy --workspace --all-targets -- -D warnings
#   3. cargo test --workspace
#   4. cargo build --release
#
# Matrices:
#   - ubuntu-latest: primary; tiberius builds correctly here
#   - windows-latest: optional mirror; the team uses Windows for dev
#
# Toolchain pinning:
#   - dtolnay/rust-toolchain reads rust-toolchain.toml automatically
#     (no manual channel duplication here).
#   - Swatinem/rust-cache@v4 keys on rust-toolchain.toml so cache
#     invalidates automatically when the toolchain file changes.
#
# Fail-fast: any step failing aborts the run.

name: CI

on:
  push:
    branches: [main, "chore/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Network glitch workaround on Windows runners — see AGENTS.md / plan.
  RUSTUP_MAX_RETRIES: "10"
  # Suppress cargo's incremental-build noise in CI logs.
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  fmt:
    name: fmt (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          components: rustfmt

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v4
        with:
          cache-on-failure: true

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          components: clippy

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v4
        with:
          cache-on-failure: true

      # `--all-features` exposes feature-gated dead code so the
      # `-D warnings` gate catches it before merge.
      - name: cargo clippy (workspace, all targets, all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v4
        with:
          cache-on-failure: true

      # `--all-features` matches clippy so feature-gated code is
      # exercised in CI. Single-threaded because rust_i18n uses a
      # global locale (see project AGENTS.md / test_count_2026-06-19).
      - name: cargo test (workspace, all features)
        run: cargo test --workspace --all-features -- --test-threads=1

  build:
    name: build-release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v4
        with:
          cache-on-failure: true

      - name: cargo build --release
        run: cargo build --workspace --release
