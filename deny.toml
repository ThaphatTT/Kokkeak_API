












[graph]




multiple-versions = "warn"

[output]


when = { feature = "deny", level = "warn" }
when = { feature = "warn", level = "warn" }

[advisories]



ignore = [
    
    
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",   
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",                          
    "OpenSSL",                          
]


confidence-threshold = 0.8

[bans]


deny = [
    
    
    { name = "http" },

    
    
    { name = "ring" },

    
    { name = "time" },
]


skip = [
    { name = "openssl" },                
    { name = "windows-sys" },           
]


wildcards = "deny"

[sources]



unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]


