# Simplified Chinese locale.
#
# Added 2026-07-01 to support Chinese-speaking customers and admins.
# Uses Simplified characters (zh-CN / zh-Hans); Traditional (zh-TW)
# is NOT covered — request that separately if needed.
#
# NOTE: This is **starter copy** — native Chinese speakers on the
# KOKKAK team must review every string before shipping. The
# translation conveys the *meaning* of the English original, not
# a literal word-for-word rendering. Formal register (您-style) is
# used throughout — the admin web and mobile customer/technician
# clients are both business contexts.

