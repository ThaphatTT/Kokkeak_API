# Thai locale.
#
# Project primary language (per AGENTS.md § 13). The Lao market is
# the deployment target; Thai covers a sizable secondary market and
# helps reviewers verify coverage.
#
# NOTE: This is **starter copy** — native speakers on the KOKKAK
# team must review every string before shipping. The translation
# must convey the *meaning* of the English original, not be a
# literal word-for-word rendering.

