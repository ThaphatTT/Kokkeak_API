

name: kokkak

x-common-env: &common-env

  KOKKAK_ENV: dev
  KOKKAK_LOG__FORMAT: pretty

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: kokkak-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: DevStrong!Passw0rd
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:

      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'DevStrong!Passw0rd' -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: kokkak-redis
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: kokkak-nats
    command: ["nats-server", "-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
      - "6222:6222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    container_name: kokkak-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: kokkak-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: kokkak
      MINIO_ROOT_PASSWORD: DevStrong!Passw0rd
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kokkak-api
    image: kokkak:latest

    entrypoint: ["/usr/local/bin/kokkak-api"]
    environment:
      <<: *common-env
      KOKKAK_SERVER__ADDR: 0.0.0.0:8080

      KOKKAK_SERVER__PUBLIC_BASE_URL: http://localhost:8080
      KOKKAK_DATABASE__SQLSERVER_URL: mssql://sa:DevStrong!Passw0rd@sqlserver:1433/KOKKAK_MASTER?encrypt=true&trustservercertificate=true
      KOKKAK_DATABASE__POOL_SIZE: "20"
      KOKKAK_REDIS__URL: redis://redis:6379
      KOKKAK_NATS__URL: nats://nats:4222
      KOKKAK_MONGO__URL: mongodb://mongo:27017
      KOKKAK_AUTH__JWT_SECRET: dev-only-not-for-prod-replace-me
      KOKKAK_AUTH__ISSUER: kokkak-api

      KOKKAK_STORAGE__SIGNED_URL_SECRET: dev-secret-please-change-min-32-bytes-long
      KOKKAK_STORAGE__SIGNED_URL_TTL_SECS: "600"

      KOKKAK_SERVER__TLS__ENABLED: "false"
    ports:
      - "8080:8080"
    volumes:

      - api-data:/app/data
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:

      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/readyz | grep -q ready || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kokkak-worker
    image: kokkak:latest

    entrypoint: ["/usr/local/bin/kokkak-worker"]
    environment:
      <<: *common-env
      KOKKAK_DATABASE__SQLSERVER_URL: mssql://sa:DevStrong!Passw0rd@sqlserver:1433/KOKKAK_MASTER?encrypt=true&trustservercertificate=true
      KOKKAK_REDIS__URL: redis://redis:6379
      KOKKAK_NATS__URL: nats://nats:4222
      KOKKAK_MONGO__URL: mongodb://mongo:27017
      KOKKAK_AUTH__JWT_SECRET: dev-only-not-for-prod-replace-me
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver-data:
  redis-data:
  nats-data:
  mongo-data:
  minio-data:
  api-data:

networks:
  default:
    name: kokkak-net
